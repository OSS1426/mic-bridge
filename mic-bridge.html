<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>הקלטת קול - DELTA ONE VOICE</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #2e6c1d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  #status {
    font-size: 16px;
    margin-bottom: 28px;
    min-height: 44px;
    line-height: 1.4;
  }
  #micBtn {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.5);
    background: #d32f2f;
    color: #fff;
    font-size: 42px;
    cursor: pointer;
  }
  #micBtn.recording {
    animation: pulse 1.2s infinite;
    background: #b71c1c;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.5); }
    70%  { box-shadow: 0 0 0 22px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }
  #err {
    color: #ffcdd2;
    margin-top: 18px;
    font-size: 13px;
    max-width: 280px;
  }
</style>
</head>
<body>
  <div id="status">לחץ/י על המיקרופון כדי להתחיל<br><span style="opacity:.8;font-size:13px">Tap the mic to start recording</span></div>
  <button id="micBtn">🎙️</button>
  <div id="err"></div>

<script>
  let mediaRecorder = null;
  let chunks = [];
  let recording = false;

  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('status');
  const err = document.getElementById('err');

  micBtn.addEventListener('click', async function() {
    err.innerText = '';

    if (!recording) {
      // --- Start recording ---
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = function(e) {
          if (e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = function() {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = function() {
            const base64Data = reader.result.split(',')[1];
            if (window.opener) {
              window.opener.postMessage({
                type: 'DELTA_VOICE_CAPTURE',
                base64Data: base64Data,
                mimeType: blob.type
              }, '*');
            }
            window.close();
          };
          reader.readAsDataURL(blob);
        };

        mediaRecorder.start();
        recording = true;
        micBtn.classList.add('recording');
        micBtn.innerText = '🛑';
        status.innerHTML = 'מקליט... לחץ/י שוב לסיום<br><span style="opacity:.8;font-size:13px">Recording... tap again to stop</span>';
      } catch (e) {
        if (e.name === 'NotAllowedError') {
          err.innerText = 'הגישה למיקרופון נחסמה. אנא אשר/י גישה בהגדרות הדפדפן עבור אתר זה.\nMicrophone access denied. Please allow it in your browser settings for this site.';
        } else {
          err.innerText = 'שגיאה: ' + e.message;
        }
      }
    } else {
      // --- Stop recording ---
      recording = false;
      micBtn.classList.remove('recording');
      status.innerText = 'מעבד... / Processing...';
      mediaRecorder.stop();
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DELTA VOICE</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #2e6c1d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    text-align: center;
  }
  #icon { font-size: 30px; line-height: 1; }
  #icon.recording { animation: pulse 1.1s infinite; }
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  #status { font-size: 9px; margin-top: 3px; opacity: 0.85; line-height: 1.2; }
  #err { color: #ffcdd2; margin-top: 3px; font-size: 8px; max-width: 100px; }
  #backBtn {
    display: none;
    margin-top: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.5);
    color: #fff;
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  #backBtn:active { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
  <div id="icon">🔐</div>
  <div id="status">מבקש הרשאת מיקרופון... / Requesting mic permission...</div>
  <div id="err"></div>
  <button id="backBtn" onclick="backToTranslator()">⬅ חזרה למתרגם / Back to Translator</button>

<script>
  // Holding a live getUserMedia stream open continuously locks the phone's
  // microphone hardware for the whole session, which can silently block
  // other apps from recording. So this page now only holds the stream for
  // the moments it's actually needed - a quick probe during approval, and
  // for the duration of each recording - releasing it immediately after.
  const IDLE_CLOSE_MS = 3 * 60 * 1000; // self-terminate after 3 min of no activity

  let stream = null;
  let mediaRecorder = null;
  let chunks = [];
  let pendingStop = false;
  let starting = false;
  let approved = false;
  let idleTimer = null;

  const iconEl = document.getElementById('icon');
  const statusEl = document.getElementById('status');
  const errEl = document.getElementById('err');
  const backBtn = document.getElementById('backBtn');

  function setStatus(recording, text) {
    iconEl.classList.toggle('recording', recording);
    iconEl.innerText = recording ? '🛑' : (approved ? '🎙️' : '🔐');
    statusEl.innerText = text;
  }

  function releaseStream() {
    if (stream) {
      stream.getTracks().forEach(function(t) { t.stop(); });
      stream = null;
    }
  }

  function selfTerminate() {
    releaseStream();
    if (window.opener) {
      try { window.opener.postMessage({ type: 'DELTA_BRIDGE_CLOSING' }, '*'); } catch (e) {}
    }
    window.close();
  }

  function resetIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(selfTerminate, IDLE_CLOSE_MS);
  }

  // Bring focus back to the main translator tab/window. The helper window
  // stays open in the background rather than closing, so later recordings
  // in this session don't have to open a new window each time - it will
  // still self-close on its own after a few minutes of no use.
  function backToTranslator() {
    if (window.opener) {
      try { window.opener.focus(); } catch (e) {}
    }
    try { window.blur(); } catch (e) {}
  }

  // The approval step: briefly request the mic just to trigger/confirm the
  // browser's one-time permission prompt, then immediately let go of it
  // again - approval doesn't require holding the hardware open.
  async function requestApproval() {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getTracks().forEach(function(t) { t.stop(); });
      approved = true;
      setStatus(false, 'אושר! ✓ / Approved!');
      backBtn.style.display = 'inline-block';
      resetIdleTimer();
      if (window.opener) {
        window.opener.postMessage({ type: 'DELTA_MIC_APPROVED' }, '*');
      }
    } catch (e) {
      const msg = (e.name === 'NotAllowedError') ? 'הגישה למיקרופון נחסמה' : e.message;
      errEl.innerText = msg;
      setStatus(false, 'האישור נכשל / Approval failed');
      backBtn.style.display = 'inline-block';
      resetIdleTimer();
      if (window.opener) {
        window.opener.postMessage({ type: 'DELTA_VOICE_ERROR', message: msg }, '*');
      }
    }
  }

  async function handleStart() {
    if (!approved || starting || (mediaRecorder && mediaRecorder.state === 'recording')) return;
    starting = true;
    pendingStop = false;
    clearTimeout(idleTimer); // don't self-close mid-recording

    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        releaseStream(); // give the mic back the instant recording ends
        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = function() {
          const base64Data = reader.result.split(',')[1];
          if (window.opener) {
            window.opener.postMessage({
              type: 'DELTA_VOICE_CAPTURE',
              base64Data: base64Data,
              mimeType: blob.type
            }, '*');
          }
          setStatus(false, 'אושר! ✓ / Approved!');
          resetIdleTimer();
        };
        reader.readAsDataURL(blob);
      };

      mediaRecorder.start();
      starting = false;
      setStatus(true, 'מקליט... / Recording...');

      if (pendingStop) {
        mediaRecorder.stop();
      }
    } catch (e) {
      starting = false;
      releaseStream();
      resetIdleTimer();
      const msg = (e.name === 'NotAllowedError') ? 'הגישה נחסמה' : e.message;
      errEl.innerText = msg;
      if (window.opener) {
        window.opener.postMessage({ type: 'DELTA_VOICE_ERROR', message: msg }, '*');
      }
    }
  }

  function handleStop() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    } else {
      pendingStop = true;
    }
  }

  window.addEventListener('message', function(event) {
    if (!event.data || !event.data.type) return;
    if (event.data.type === 'START_RECORDING') handleStart();
    if (event.data.type === 'STOP_RECORDING') handleStop();
  });

  window.addEventListener('beforeunload', function() {
    releaseStream();
  });

  if (window.opener) {
    window.opener.postMessage({ type: 'DELTA_BRIDGE_READY' }, '*');
  }

  requestApproval();
</script>
</body>
</html>

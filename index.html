<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DELTA VOICE</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #2e6c1d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    text-align: center;
  }
  #icon { font-size: 34px; line-height: 1; }
  #icon.recording { animation: pulse 1.1s infinite; }
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  #status { font-size: 9px; margin-top: 4px; opacity: 0.85; line-height: 1.2; }
  #err { color: #ffcdd2; margin-top: 4px; font-size: 8px; max-width: 84px; }
</style>
</head>
<body>
  <div id="icon">🎙️</div>
  <div id="status">מוכן</div>
  <div id="err"></div>

<script>
  let stream = null;
  let mediaRecorder = null;
  let chunks = [];
  let pendingStop = false;
  let starting = false;

  const iconEl = document.getElementById('icon');
  const statusEl = document.getElementById('status');
  const errEl = document.getElementById('err');

  function setStatus(recording, text) {
    iconEl.classList.toggle('recording', recording);
    iconEl.innerText = recording ? '🛑' : '🎙️';
    statusEl.innerText = text;
  }

  async function ensureStream() {
    if (stream) return stream;
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    return stream;
  }

  async function handleStart() {
    if (starting || (mediaRecorder && mediaRecorder.state === 'recording')) return;
    starting = true;
    pendingStop = false;
    try {
      const s = await ensureStream();
      chunks = [];
      mediaRecorder = new MediaRecorder(s);

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = function() {
          const base64Data = reader.result.split(',')[1];
          if (window.opener) {
            window.opener.postMessage({
              type: 'DELTA_VOICE_CAPTURE',
              base64Data: base64Data,
              mimeType: blob.type
            }, '*');
          }
          setStatus(false, 'מוכן');
        };
        reader.readAsDataURL(blob);
      };

      mediaRecorder.start();
      starting = false;
      setStatus(true, 'מקליט');

      if (pendingStop) {
        mediaRecorder.stop();
      }
    } catch (e) {
      starting = false;
      const msg = (e.name === 'NotAllowedError') ? 'הגישה נחסמה' : e.message;
      errEl.innerText = msg;
      if (window.opener) {
        window.opener.postMessage({ type: 'DELTA_VOICE_ERROR', message: msg }, '*');
      }
    }
  }

  function handleStop() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    } else {
      pendingStop = true;
    }
  }

  window.addEventListener('message', function(event) {
    if (!event.data || !event.data.type) return;
    if (event.data.type === 'START_RECORDING') handleStart();
    if (event.data.type === 'STOP_RECORDING') handleStop();
  });

  window.addEventListener('beforeunload', function() {
    if (stream) stream.getTracks().forEach(t => t.stop());
  });

  if (window.opener) {
    window.opener.postMessage({ type: 'DELTA_BRIDGE_READY' }, '*');
  }
</script>
</body>
</html>
